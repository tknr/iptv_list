<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iptv_list</title>
<link href="//cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
<link rel="stylesheet" href="//cdn.datatables.net/2.1.3/css/dataTables.dataTables.css" />

</head>
<body>
<h1>Hello, world!</h1>
<div>
<table id="table" class="table table-bordered table-striped dt-responsive nowrap">
</table>
</div>
<script src="//cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script src="//cdn.datatables.net/2.1.3/js/dataTables.min.js"></script>
<script>
$(function () {
// fixme load ajax to data
		$('#table').DataTable(
				{
language: {
url: "//cdn.datatables.net/plug-ins/2.0.1/i18n/ja.json",
},
searching: true,
ordering: true,
lengthChange: true,
serverSide:false,
scrollX: true,
scrollCollapse: true,
deferRender: true,
stateSave: false,
data:data,
columns: [
// #0
{
data: 'kaiin_no',
title: '会員番号',
orderable: true
},
],
	// デフォルト並べ替え項目を指定
	order: [
		[5, 'desc']
	],
	);
});
</script>
</body>
</html>
